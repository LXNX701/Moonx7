<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gestión de Pedidos - MoonX7</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm" } }
</script>
<style>
  .glass-panel { background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid #2a2a2a; }
</style>
</head>
<body class="bg-background text-on-surface">
<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-surface-container border-r border-outline-variant p-4">
  <div class="mb-8"><h1 class="text-xl font-bold text-primary">🌙 MoonX7</h1><p class="text-xs text-on-surface-variant">Admin Panel</p></div>
  <nav class="space-y-2 flex-1">
    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">📊 Dashboard</a>
    <a href="admin-productos.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">📦 Productos</a>
    <a href="admin-pedidos.html" class="flex items-center gap-3 px-4 py-3 bg-primary-container text-on-primary-container rounded-lg font-bold">📋 Pedidos</a>
    <a href="admin-pagos.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">💳 Métodos de Pago</a>
  </nav>
  <button id="logoutBtn" class="w-full bg-error-container text-on-error-container py-2 rounded-lg">🚪 Cerrar Sesión</button>
</aside>

<main class="md:ml-64 p-8">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">📋 Gestión de Pedidos</h1>
    <select id="statusFilter" class="bg-surface-container-low border border-outline-variant rounded-lg p-2">
      <option value="all">Todos</option>
      <option value="pending">⏳ Pendientes</option>
      <option value="completed">✅ Completados</option>
    </select>
  </div>

  <div id="ordersList" class="space-y-4"></div>
</main>

<div id="orderModal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4">
  <div class="bg-surface-container-high rounded-2xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold">Detalles del pedido</h3><button onclick="closeModal()" class="text-on-surface-variant">✕</button></div>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module">
  import { supabase, getCurrentUser, signOut, updateOrderStatus } from './js/supabase.js';
  
  const user = await getCurrentUser();
  if (!user || user.role !== 'admin') location.href = 'index.html';
  
  async function loadOrders() {
    const filter = document.getElementById('statusFilter').value;
    let query = supabase.from('orders').select('*').order('created_at', { ascending: false });
    if (filter !== 'all') query = query.eq('status', filter);
    const { data } = await query;
    
    const container = document.getElementById('ordersList');
    if (!data || data.length === 0) { container.innerHTML = '<div class="glass-panel p-8 text-center">No hay pedidos</div>'; return; }
    
    container.innerHTML = data.map(o => `
      <div class="glass-panel p-5 rounded-xl">
        <div class="flex flex-wrap justify-between items-start gap-3">
          <div><span class="font-mono text-primary font-bold">#${o.order_number}</span><span class="ml-3 px-2 py-0.5 rounded-full text-xs ${o.status === 'pending' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-green-500/20 text-green-400'}">${o.status}</span></div>
          <div class="text-right"><div class="text-primary font-bold">$${o.total}</div><div class="text-xs">${new Date(o.created_at).toLocaleString()}</div></div>
        </div>
        <div class="mt-3"><div>👤 ${o.customer_name}</div><div>📞 ${o.customer_phone}</div></div>
        <div class="flex flex-wrap gap-2 mt-4 pt-3 border-t border-outline-variant">
          <button onclick="viewOrder(${o.id})" class="bg-primary-container px-4 py-2 rounded-lg text-sm">📋 Ver</button>
          <button onclick="contactWhatsApp('${o.customer_phone}', '${o.order_number}')" class="bg-green-600/20 text-green-400 px-4 py-2 rounded-lg text-sm">💬 WhatsApp</button>
          <select onchange="updateStatus(${o.id}, this.value)" class="bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-sm">
            <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>⏳ Pendiente</option>
            <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>✅ Completado</option>
          </select>
        </div>
      </div>
    `).join('');
  }
  
  window.viewOrder = async (id) => {
    const { data: o } = await supabase.from('orders').select('*').eq('id', id).single();
    document.getElementById('modalContent').innerHTML = `
      <div class="space-y-4">
        <div><strong>Pedido:</strong> #${o.order_number}</div>
        <div><strong>Cliente:</strong> ${o.customer_name}<br>📞 ${o.customer_phone}</div>
        <div><strong>Productos:</strong><br>${o.products.map(p => `${p.name} x${p.quantity} = $${(p.price * p.quantity).toFixed(2)}`).join('<br>')}</div>
        <div><strong>Total:</strong> $${o.total}</div>
        <div><strong>Notas:</strong> ${o.notes || 'Ninguna'}</div>
        <div><h4 class="font-bold mb-2">🔑 Entregar licencia:</h4><textarea id="licenseInput" rows="2" class="w-full bg-surface-container-low border rounded-lg p-2" placeholder="Escribe la clave/licencia..."></textarea><button onclick="deliverLicense(${o.id})" class="mt-2 bg-primary-container px-4 py-2 rounded-lg w-full">✅ Entregar</button></div>
      </div>
    `;
    document.getElementById('orderModal').classList.remove('hidden'); document.getElementById('orderModal').classList.add('flex');
  };
  
  window.deliverLicense = async (orderId) => {
    const license = document.getElementById('licenseInput').value;
    if (!license) { alert('Escribe la licencia primero'); return; }
    await updateOrderStatus(orderId, 'completed', license);
    closeModal(); loadOrders();
  };
  
  window.updateStatus = async (id, status) => { await updateOrderStatus(id, status); loadOrders(); };
  window.contactWhatsApp = (phone, order) => window.open(`https://wa.me/${phone.replace(/[^0-9+]/g, '')}?text=${encodeURIComponent(`Hola! Soy de MoonX7. Tu pedido #${order} está listo.`)}`, '_blank');
  window.closeModal = () => { document.getElementById('orderModal').classList.add('hidden'); document.getElementById('orderModal').classList.remove('flex'); };
  document.getElementById('logoutBtn').onclick = async () => { await signOut(); location.href = 'index.html'; };
  document.getElementById('statusFilter').onchange = () => loadOrders();
  
  loadOrders();
  setInterval(loadOrders, 30000);
</script>
</body>
</html>
