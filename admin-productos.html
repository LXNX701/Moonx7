<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Productos - MoonX7 Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm" } }
</script>
<style>
  .glass-panel { background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid #2a2a2a; }
</style>
</head>
<body class="bg-background text-on-surface">
<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-surface-container border-r border-outline-variant p-4">
  <div class="mb-8"><h1 class="text-xl font-bold text-primary">🌙 MoonX7</h1><p class="text-xs text-on-surface-variant">Admin Panel</p></div>
  <nav class="space-y-2 flex-1">
    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">📊 Dashboard</a>
    <a href="admin-productos.html" class="flex items-center gap-3 px-4 py-3 bg-primary-container text-on-primary-container rounded-lg font-bold">📦 Productos</a>
    <a href="admin-pedidos.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">📋 Pedidos</a>
    <a href="admin-pagos.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">💳 Métodos de Pago</a>
  </nav>
  <button id="logoutBtn" class="w-full bg-error-container text-on-error-container py-2 rounded-lg">🚪 Cerrar Sesión</button>
</aside>

<main class="md:ml-64 p-8">
  <div class="flex justify-between items-center mb-8"><h1 class="text-3xl font-bold">📦 Productos</h1></div>
  
  <div class="glass-panel p-6 rounded-xl mb-8">
    <h2 class="text-xl font-bold mb-4">➕ Nuevo producto</h2>
    <form id="productForm" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="prodName" placeholder="Nombre" required class="bg-surface-container-low border rounded-lg p-3">
        <input type="number" id="prodPrice" placeholder="Precio USD" required class="bg-surface-container-low border rounded-lg p-3">
        <select id="prodCategory" class="bg-surface-container-low border rounded-lg p-3"><option>Software</option><option>Hardware</option><option>Security</option><option>Mods</option></select>
        <input type="number" id="prodStock" placeholder="Stock" value="10" class="bg-surface-container-low border rounded-lg p-3">
      </div>
      <textarea id="prodDesc" rows="2" placeholder="Descripción" class="w-full bg-surface-container-low border rounded-lg p-3"></textarea>
      <input type="url" id="prodImage" placeholder="URL de la imagen" value="https://placehold.co/400x300/1a1a1a/ff571a?text=Producto" class="w-full bg-surface-container-low border rounded-lg p-3">
      <div class="flex items-center gap-3"><input type="checkbox" id="prodHot"> <label>Marcar como HOT</label></div>
      <button type="submit" class="bg-primary py-2 rounded-lg font-bold">📌 Publicar producto</button>
    </form>
  </div>
  
  <div class="glass-panel p-6 rounded-xl">
    <h2 class="text-xl font-bold mb-4">📋 Lista de productos</h2>
    <div id="productsList" class="space-y-3"></div>
  </div>
</main>

<script type="module">
  import { supabase, getCurrentUser, signOut, getProducts, createProduct, deleteProduct } from './js/supabase.js';
  
  const user = await getCurrentUser();
  if (!user || user.role !== 'admin') location.href = 'index.html';
  
  async function loadProducts() {
    const products = await getProducts();
    const container = document.getElementById('productsList');
    container.innerHTML = products.map(p => `
      <div class="flex justify-between items-center p-3 bg-surface-container-low rounded-lg">
        <div class="flex items-center gap-3"><img src="${p.image || 'https://placehold.co/40x40'}" class="w-10 h-10 rounded object-cover"><div><div class="font-bold">${p.name}</div><div class="text-sm text-primary">$${p.price}</div></div></div>
        <button onclick="deleteProd(${p.id})" class="bg-error-container text-on-error-container px-3 py-1 rounded">Eliminar</button>
      </div>
    `).join('');
  }
  
  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    await createProduct({ name: document.getElementById('prodName').value, price: parseFloat(document.getElementById('prodPrice').value), category: document.getElementById('prodCategory').value, description: document.getElementById('prodDesc').value, image: document.getElementById('prodImage').value, hot: document.getElementById('prodHot').checked, stock: parseInt(document.getElementById('prodStock').value) || 0, rating: 5, reviews: 0 });
    alert('Producto creado'); e.target.reset(); loadProducts();
  });
  
  window.deleteProd = async (id) => { if (confirm('¿Eliminar?')) { await deleteProduct(id); loadProducts(); } };
  document.getElementById('logoutBtn').onclick = async () => { await signOut(); location.href = 'index.html'; };
  
  loadProducts();
</script>
</body>
</html>
