<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Center | Moonzaza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-bg">
    
    <div id="loginSection" class="auth-box">
        <div class="logo">🌙 MOON<span>AUTH</span></div>
        <p>Introduce tus credenciales de administrador</p>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-main" onclick="login()">INGRESAR</button>
    </div>

    <div id="adminPanel" style="display:none;" class="admin-wrapper">
        <div class="admin-nav">
            <h2>MOON CONTROL PANEL</h2>
            <button onclick="logout()">Salir</button>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>AÑADIR NUEVO PRODUCTO</h3>
                <div class="form-group">
                    <input type="text" id="pN" placeholder="Nombre (Ej: Panel VIP)">
                    <input type="number" id="pP" placeholder="Precio USD">
                    <input type="text" id="pI" placeholder="URL Imagen (Link directo)">
                    <button class="btn-main" onclick="saveProd()">SUBIR A LA ÓRBITA</button>
                </div>
            </div>

            <div class="card">
                <h3>REGISTRO DE ACTIVIDAD (LOGS)</h3>
                <div id="logsList" class="logs-list"></div>
            </div>
        </div>

        <h3 class="mt-4">PRODUCTOS EN VIVO</h3>
        <div id="adminList" class="admin-inventory"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
