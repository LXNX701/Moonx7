<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - MoonX7</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm" } }
</script>
<style>
  .glass-card { background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid #2A2A2A; }
</style>
</head>
<body class="bg-background text-on-surface">
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant">
  <div class="flex justify-between items-center px-4 md:px-8 max-w-7xl mx-auto h-16">
    <div class="text-xl font-bold text-primary cursor-pointer" onclick="location.href='index.html'">🌙 MoonX7</div>
  </div>
</header>

<main class="pt-24 max-w-2xl mx-auto px-4 pb-24">
  <h1 class="text-3xl font-bold mb-8">📋 Completar compra</h1>

  <div class="glass-card p-6 rounded-2xl mb-6">
    <h2 class="text-xl font-bold mb-4">Resumen</h2>
    <div id="cartSummary" class="space-y-2"></div>
    <div class="border-t border-outline-variant pt-4 mt-4 text-right">
      <span class="text-xl font-bold text-primary" id="totalAmount">$0.00</span>
    </div>
  </div>

  <div class="glass-card p-6 rounded-2xl">
    <h2 class="text-xl font-bold mb-4">📞 Tus datos</h2>
    <form id="checkoutForm" class="space-y-4">
      <input type="text" id="customerName" required placeholder="Nombre completo" class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3">
      <input type="tel" id="customerPhone" required placeholder="WhatsApp (ej: +54 9 11 12345678)" class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3">
      <input type="email" id="customerEmail" placeholder="Email (opcional)" class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3">
      
      <div id="paymentMethodsContainer" class="space-y-3"></div>
      
      <textarea id="notes" rows="2" placeholder="Algo que quieras agregar..." class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3"></textarea>
      
      <button type="submit" class="w-full bg-primary-container text-on-primary-container py-4 rounded-xl font-bold text-lg">✅ Enviar pedido</button>
    </form>
  </div>
</main>

<script type="module">
  import { supabase, getCart, getCurrentUser, getPaymentMethods } from './js/supabase.js';
  
  const user = await getCurrentUser();
  if (!user) location.href = 'index.html';
  
  let cart = [];
  let total = 0;
  
  async function loadCart() {
    cart = await getCart(user.id);
    if (cart.length === 0) { alert('Carrito vacío'); location.href = 'index.html'; return; }
    total = cart.reduce((s, i) => s + (i.products.price * i.quantity), 0);
    document.getElementById('cartSummary').innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.products.name} x${i.quantity}</span><span>$${(i.products.price * i.quantity).toFixed(2)}</span></div>`).join('');
    document.getElementById('totalAmount').textContent = `$${total.toFixed(2)}`;
  }
  
  async function loadPaymentMethods() {
    const methods = await getPaymentMethods();
    const container = document.getElementById('paymentMethodsContainer');
    container.innerHTML = methods.map((m, idx) => `
      <label class="flex items-start gap-3 p-3 bg-surface-container-low rounded-xl border-2 cursor-pointer ${idx === 0 ? 'border-primary' : 'border-outline-variant'}">
        <input type="radio" name="paymentMethodId" value="${m.id}" data-name="${m.name}" ${idx === 0 ? 'checked' : ''} class="mt-1">
        <div><div class="font-bold">${m.name}</div>${m.description ? `<p class="text-sm text-on-surface-variant">${m.description}</p>` : ''}</div>
      </label>
    `).join('');
  }
  
  document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const selected = document.querySelector('input[name="paymentMethodId"]:checked');
    
    const orderData = {
      order_number: 'MX7-' + Date.now(),
      user_id: user.id,
      customer_name: document.getElementById('customerName').value,
      customer_phone: document.getElementById('customerPhone').value,
      customer_email: document.getElementById('customerEmail').value,
      products: cart.map(i => ({ id: i.product_id, name: i.products.name, price: i.products.price, quantity: i.quantity })),
      total: total,
      payment_method_id: selected?.value,
      payment_method_name: selected?.dataset.name,
      notes: document.getElementById('notes').value,
      status: 'pending'
    };
    
    const { error } = await supabase.from('orders').insert([orderData]);
    if (error) { alert('Error: ' + error.message); return; }
    
    await supabase.from('cart').delete().eq('user_id', user.id);
    alert('✅ Pedido recibido! En breve te contactaremos por WhatsApp.');
    location.href = 'mis-pedidos.html';
  });
  
  await loadCart();
  await loadPaymentMethods();
</script>
</body>
</html>
