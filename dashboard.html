<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - MoonX7 Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm" } }
</script>
<style>
  .glass-panel { background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid #2a2a2a; }
</style>
</head>
<body class="bg-background text-on-surface">
<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-surface-container border-r border-outline-variant p-4">
  <div class="mb-8"><h1 class="text-xl font-bold text-primary">🌙 MoonX7</h1><p class="text-xs text-on-surface-variant">Admin Panel</p></div>
  <nav class="space-y-2 flex-1">
    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-primary-container text-on-primary-container rounded-lg font-bold">📊 Dashboard</a>
    <a href="admin-productos.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">📦 Productos</a>
    <a href="admin-pedidos.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">📋 Pedidos</a>
    <a href="admin-pagos.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg">💳 Métodos de Pago</a>
  </nav>
  <button id="logoutBtn" class="w-full bg-error-container text-on-error-container py-2 rounded-lg">🚪 Cerrar Sesión</button>
</aside>

<main class="md:ml-64 p-8">
  <h1 class="text-3xl font-bold mb-8">Panel de Administración</h1>
  
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="glass-panel p-6 rounded-xl text-center"><div class="text-3xl font-bold text-primary" id="totalProducts">0</div><div>Productos</div></div>
    <div class="glass-panel p-6 rounded-xl text-center"><div class="text-3xl font-bold text-secondary" id="pendingOrders">0</div><div>Pedidos pendientes</div></div>
    <div class="glass-panel p-6 rounded-xl text-center"><div class="text-3xl font-bold text-tertiary" id="totalRevenue">$0</div><div>Ingresos</div></div>
  </div>
  
  <div class="glass-panel p-6 rounded-xl">
    <h2 class="text-xl font-bold mb-4">📋 Últimos pedidos</h2>
    <div id="recentOrders" class="space-y-2"></div>
  </div>
</main>

<script type="module">
  import { supabase, getCurrentUser, signOut } from './js/supabase.js';
  
  const user = await getCurrentUser();
  if (!user || user.role !== 'admin') location.href = 'index.html';
  
  async function loadStats() {
    const { data: products } = await supabase.from('products').select('id');
    const { data: orders } = await supabase.from('orders').select('status, total');
    const pending = orders?.filter(o => o.status === 'pending').length || 0;
    const revenue = orders?.filter(o => o.status === 'completed').reduce((s, o) => s + o.total, 0) || 0;
    
    document.getElementById('totalProducts').textContent = products?.length || 0;
    document.getElementById('pendingOrders').textContent = pending;
    document.getElementById('totalRevenue').textContent = `$${revenue.toFixed(2)}`;
    
    const recent = orders?.slice(0, 5) || [];
    document.getElementById('recentOrders').innerHTML = recent.map(o => `
      <div class="flex justify-between items-center p-3 bg-surface-container-low rounded-lg">
        <span>${o.status === 'pending' ? '⏳' : '✅'} ${new Date(o.created_at).toLocaleDateString()}</span>
        <span>$${o.total}</span>
      </div>
    `).join('') || '<p class="text-center text-on-surface-variant">Sin pedidos aún</p>';
  }
  
  document.getElementById('logoutBtn').onclick = async () => { await signOut(); location.href = 'index.html'; };
  loadStats();
</script>
</body>
</html>
