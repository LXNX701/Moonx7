<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOONZAZA | Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="nav-wrapper">
            <div class="logo">🌙 MOON<span>ZAZA</span></div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleCart()">
                    <span class="cart-count" id="CN">0</span>
                    🛒
                </button>
            </div>
        </div>
    </header>

    <main class="app-content">
        <section class="hero-card">
            <div class="glass-info">
                <span class="badge">SISTEMA MOONX7</span>
                <h1>COMPRÁ INNOVACIÓN</h1>
                <p>Paneles verificados con entrega en 3 minutos.</p>
            </div>
        </section>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Buscar productos, ofertas, marcas...">
        </div>

        <h2 class="section-title">Productos Destacados</h2>
        <div id="productsGrid" class="product-grid">
            </div>
    </main>

    <div id="cartOverlay" class="overlay" onclick="toggleCart()"></div>
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>MI COMPRA</h3>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        
        <div id="cartItems" class="cart-items-list"></div>

        <div class="upsell-section">
            <h4>¿Te olvidaste algo?</h4>
            <div class="upsell-grid" id="upsellGrid"></div>
        </div>

        <div class="cart-footer">
            <div class="price-row"><span>Total</span> <span id="CT">$0.00</span></div>
            <button class="btn-checkout" onclick="checkout()">FINALIZAR COMPRA</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
