<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOONZAZA | Cosmic Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-container"><div class="moon-spinner"></div><p>CARGANDO ÓRBITA...</p></div>

    <header>
        <div class="top-announcement">ENTREGA INMEDIATA — MOONX7 SYSTEM ACTIVE</div>
        <nav class="navbar">
            <a href="index.html" class="logo">🌙 MOON<span>ZAZA</span></a>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar en el cosmos...">
            </div>
            <div class="nav-tools">
                <button class="cart-icon" onclick="toggleCart()">🛒 <span id="CN">0</span></button>
                <a href="admin.html" class="admin-gear">⚙️</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero-banner">
            <h1>INNOVACIÓN <span>CÓSMICA</span></h1>
            <p>Los mejores paneles y servicios digitales en un solo lugar.</p>
        </section>
        <div id="productsGrid" class="cosmic-grid"></div>
    </main>

    <div id="cartOverlay" class="overlay" onclick="toggleCart()"></div>
    <div id="cartSidebar" class="sidebar">
        <div class="side-header"><h3>MI CARRITO</h3><button onclick="toggleCart()">✕</button></div>
        <div id="cartItems" class="side-content"></div>
        <div class="side-footer">
            <div class="total-line">Total: <span id="CT">$0.00 USD</span></div>
            <button class="btn-stellar" onclick="checkout()">PEDIR POR WHATSAPP</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
