<!DOCTYPE html>
<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mis Pedidos - MoonX7</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm" } }
</script>
<style>
  .glass-card { background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid #2A2A2A; }
</style>
</head>
<body class="bg-background text-on-surface">
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant">
  <div class="flex justify-between items-center px-4 md:px-8 max-w-7xl mx-auto h-16">
    <div class="text-xl font-bold text-primary cursor-pointer" onclick="location.href='index.html'">🌙 MoonX7</div>
    <button onclick="location.href='index.html'" class="text-primary">← Volver</button>
  </div>
</header>

<main class="pt-24 max-w-4xl mx-auto px-4 pb-12">
  <h1 class="text-3xl font-bold mb-8">📦 Mis Pedidos</h1>
  <div id="ordersList" class="space-y-4"></div>
</main>

<script type="module">
  import { supabase, getCurrentUser } from './js/supabase.js';
  
  const user = await getCurrentUser();
  if (!user) location.href = 'index.html';
  
  const { data: orders } = await supabase.from('orders').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  const container = document.getElementById('ordersList');
  
  if (!orders || orders.length === 0) {
    container.innerHTML = '<div class="glass-card p-8 text-center">No tienes pedidos aún. <a href="index.html" class="text-primary">¡Compra algo!</a></div>';
  } else {
    container.innerHTML = orders.map(o => `
      <div class="glass-card p-5 rounded-xl">
        <div class="flex justify-between items-start flex-wrap gap-3">
          <div><span class="font-mono text-primary">#${o.order_number}</span><span class="ml-3 px-2 py-0.5 rounded-full text-xs ${o.status === 'pending' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-green-500/20 text-green-400'}">${o.status === 'pending' ? '⏳ Pendiente' : '✅ Entregado'}</span></div>
          <div class="text-right"><div class="text-primary font-bold">$${o.total}</div><div class="text-xs">${new Date(o.created_at).toLocaleDateString()}</div></div>
        </div>
        <div class="mt-3 text-sm">📞 ${o.customer_phone}</div>
        ${o.license_delivered ? `<div class="mt-3 p-2 bg-surface-container-low rounded-lg"><span class="text-xs">🔑 Tu licencia:</span><code class="text-primary text-sm block break-all">${o.license_delivered}</code></div>` : '<div class="mt-3 text-xs text-yellow-400">⏳ Esperando confirmación del vendedor...</div>'}
      </div>
    `).join('');
  }
</script>
</body>
</html>
